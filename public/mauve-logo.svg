<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <!-- Subtle grain texture -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Inner glow for M -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <!-- Clip for monogram box -->
    <clipPath id="boxClip">
      <rect x="0" y="0" width="96" height="96" rx="4"/>
    </clipPath>
  </defs>

  <!-- ═══ MONOGRAM MARK ═══ -->
  <!-- Outer square border — double rule luxury style -->
  <rect x="4" y="12" width="88" height="88" rx="3" fill="black"/>
  <rect x="9" y="17" width="78" height="78" rx="2" fill="none" stroke="white" stroke-width="0.6" opacity="0.35"/>

  <!-- Serif M — custom paths for a high-fashion feel -->
  <g transform="translate(48, 56)" filter="url(#softShadow)">
    <!-- M built from elegant thick/thin strokes -->
    <path d="
      M-22 24
      L-22 -24
      L-22 -24
      L-14 -24
      L0 8
      L14 -24
      L22 -24
      L22 24
      L16 24
      L16 -10
      L3 18
      L-3 18
      L-16 -10
      L-16 24
      Z
    " fill="white"/>
    <!-- Thin inner detail lines for luxury serif feel -->
    <line x1="-22" y1="-24" x2="-22" y2="-18" stroke="black" stroke-width="1.5"/>
    <line x1="22" y1="-24" x2="22" y2="-18" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Corner ornaments — classic luxury detail -->
  <g opacity="0.5" stroke="white" stroke-width="0.7" fill="none">
    <!-- top-left -->
    <path d="M10 20 L10 14 L16 14"/>
    <!-- top-right -->
    <path d="M86 20 L86 14 L80 14"/>
    <!-- bottom-left -->
    <path d="M10 76 L10 82 L16 82"/>
    <!-- bottom-right -->
    <path d="M86 76 L86 82 L80 82"/>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <g transform="translate(108, 56)">
    <!-- Brand name — wide tracked caps -->
    <text
      x="0" y="0"
      font-family="'Times New Roman', Times, Georgia, serif"
      font-size="28"
      font-weight="400"
      letter-spacing="10"
      fill="black"
      dominant-baseline="middle"
      text-anchor="start"
    >MAUVE</text>

    <!-- Thin rule below wordmark -->
    <line x1="1" y1="18" x2="188" y2="18" stroke="black" stroke-width="0.6"/>

    <!-- Tagline -->
    <text
      x="1" y="30"
      font-family="'Times New Roman', Times, Georgia, serif"
      font-size="7"
      font-weight="400"
      letter-spacing="4.5"
      fill="black"
      opacity="0.55"
      dominant-baseline="middle"
      text-anchor="start"
    >LUXURY FASHION</text>
  </g>
</svg>
